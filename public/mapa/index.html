<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geospatial Expansion Planner | Pedro Augusto Ribeiro</title>
  <meta name="description" content="Ferramenta interativa de análise geoespacial de rede de saúde, com heatmaps, raio de abrangência e simulação de expansão estratégica." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --accent: #64ffda;
      --font-mono: 'Fira Code', monospace;
      --font-main: 'Inter', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      overflow: hidden;
    }

    /* Top bar */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      background: rgba(13, 17, 23, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(100, 255, 218, 0.05);
    }

    .back-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .header-title {
      display: flex;
      flex-direction: column;
    }

    .header-title span {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      color: var(--text);
      font-weight: 500;
    }

    .header-title small {
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid;
    }

    .tag-streamlit { color: #FF4B4B; border-color: #FF4B4B; background: rgba(255, 75, 75, 0.08); }
    .tag-geo { color: #9B59B6; border-color: #9B59B6; background: rgba(155, 89, 182, 0.08); }
    .tag-python { color: #3776AB; border-color: #3776AB; background: rgba(55, 118, 171, 0.08); }

    .open-new-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .open-new-btn:hover {
      color: var(--text);
      border-color: var(--text-dim);
    }

    /* Iframe wrapper */
    .app-wrapper {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--text-dim);
    }

    .loading-text span {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a href="/" class="back-btn">
        <svg viewBox="0 0 16 16"><path d="M15 8H1m0 0 7-7M1 8l7 7"/></svg>
        Portfólio
      </a>
      <div class="header-title">
        <span>Geospatial Expansion Planner</span>
        <small>Planejador de Expansão Geoespacial · Pedro Augusto Ribeiro</small>
      </div>
    </div>
    <div class="header-right">
      <span class="tag tag-python">Python</span>
      <span class="tag tag-streamlit">Streamlit</span>
      <span class="tag tag-geo">Geospatial</span>
      <a href="https://mapasaas-bjjj55qzqcnl3rulajf9k5.streamlit.app/" target="_blank" class="open-new-btn">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
          <path d="M10.604 1h4.146a.25.25 0 0 1 .25.25v4.146a.25.25 0 0 1-.427.177L13.03 4.03 9.28 7.78a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042l3.75-3.75-1.543-1.543A.25.25 0 0 1 10.604 1zM3.75 2h3.5a.75.75 0 0 1 0 1.5H3.75A1.25 1.25 0 0 0 2.5 4.75v7.5c0 .69.56 1.25 1.25 1.25h7.5c.69 0 1.25-.56 1.25-1.25v-3.5a.75.75 0 0 1 1.5 0v3.5A2.75 2.75 0 0 1 11.25 15h-7.5A2.75 2.75 0 0 1 1 12.25v-7.5A2.75 2.75 0 0 1 3.75 2z"/>
        </svg>
        Abrir no Streamlit
      </a>
    </div>
  </header>

  <main class="app-wrapper">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <p class="loading-text">Carregando <span>Mapa Interativo</span>...</p>
    </div>
    <iframe
      id="appFrame"
      src="https://mapasaas-bjjj55qzqcnl3rulajf9k5.streamlit.app/?embed=true"
      allow="fullscreen"
      title="Geospatial Expansion Planner"
    ></iframe>
  </main>

  <script>
    const iframe = document.getElementById('appFrame');
    const overlay = document.getElementById('loadingOverlay');

    iframe.addEventListener('load', () => {
      setTimeout(() => overlay.classList.add('hidden'), 800);
    });

    // Fallback caso o evento load não dispare
    setTimeout(() => overlay.classList.add('hidden'), 8000);
  </script>
</body>
</html>
